<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />

  <title>404 — Page not found · Lexinodix</title>

  <meta name="theme-color" content="#072A40" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <script>
    (function () { try { var t = localStorage.getItem('lex-theme'); if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', t); } catch (e) {} })();

</head>
<body>

    </div>
  </header>
  <main>
    <section class="section" style="min-height:78vh;display:grid;place-items:center;text-align:center;padding-top:calc(var(--header-h) + 60px)">
      <div class="container">
        <div class="monogram" style="margin:0 auto 1.6rem">404</div>
        <h1 style="margin-bottom:.6rem">This page took a different path.</h1>

        <div class="hero-cta" style="justify-content:center">
          <a class="btn btn-primary" href="/">Return home

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;margin-top:0;justify-content:center">
        <span>© <span data-year>2026</span> Lexinodix · An AI Empire · Founded 2024</span>
      </div>
    </div>
  </footer>
  <script src="/assets/js/main.js"></script>
